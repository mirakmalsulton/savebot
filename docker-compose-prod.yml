version: "3"

volumes:
  mysql_data:

services:
  mysql:
    image: mariadb:11.0
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      - "MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}"
      - "MYSQL_DATABASE=${DB_DATABASE}"
      - "MYSQL_USER=${DB_USERNAME}"
      - "MYSQL_PASSWORD=${DB_PASSWORD}"
    ports:
      - "${DB_PORT}:3306"
    tty: true
    restart: always

  cli:
    user: "1000:2000"
    build:
      context: ./
      dockerfile: ./docker/dev/php/cli/Dockerfile
    volumes:
      - ./:/var/www/app
    environment:
      - "DB_PORT=3306"
      - "DB_HOST=mysql"
    tty: true
    restart: always

  fpm:
    user: "1000:2000"
    build:
      context: ./
      dockerfile: ./docker/dev/php/fpm/Dockerfile
    volumes:
      - ./:/var/www/app
    environment:
      - "DB_PORT=3306"
      - "DB_HOST=mysql"
    depends_on:
      - mysql
    restart: always

  nginx:
    build:
      context: ./
      dockerfile: ./docker/dev/nginx/Dockerfile
    volumes:
      - ./:/var/www/app
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - fpm
    restart: always

  worker:
    user: "1000:2000"
    build:
      context: ./
      dockerfile: ./docker/dev/php/worker/Dockerfile
    volumes:
      - ./:/var/www/app
    environment:
      - "DB_PORT=3306"
      - "DB_HOST=mysql"
    depends_on:
      - mysql
    tty: true
    restart: always
